<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Gestures NZ | Luxury Experiences</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        /* Base Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FAFAFA; /* Soft off-white */
            color: #333;
        }

        /* Hero Slider Container */
        .hero-slider {
            position: relative;
            width: 100%;
            height: 100vh; /* Full viewport height */
            min-height: 600px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Individual Slides */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center center;
            opacity: 0;
            transition: opacity 2s ease-in-out; /* Silky smooth cross-fade */
            z-index: 1;
        }
        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        /* Moody, Romantic Overlay */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(17, 26, 62, 0.4), rgba(17, 26, 62, 0.7));
            z-index: 3;
        }

        /* Content Styling */
        .hero-content {
            position: relative;
            z-index: 4;
            color: #ffffff;
            max-width: 900px;
            padding: 0 20px;
            animation: fadeIn 2s ease-out;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .hero-content p {
            font-size: 1.2rem;
            font-weight: 300;
            font-style: italic;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        /* Boutique Luxury Button */
        .btn-luxury {
            display: inline-block;
            text-decoration: none;
            color: #ffffff;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            padding: 15px 40px;
            border: 1px solid #D4AF37; /* Champagne Gold border */
            background-color: transparent;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        
        .btn-luxury:hover {
            background-color: #D4AF37;
            color: #111A3E; /* Dark slate text on hover */
        }

        /* Simple fade-in animation for initial load */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            .hero-content p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header class="hero-slider">
        <div class="slide active" style="background-image: url('https://rocketspark.pictures/CF-a0f2cf43-6e7d-4ce6-aaf7-cb64ccd0d8e2/width=1920,height=1042,fit=cover,gravity=0.50x0.29,sharpen=0.40/1a3bf8da0f8ef724af0faafaf41b7911.jpg');"></div>
        <div class="slide" style="background-image: url('https://rocketspark.pictures/CF-a0f2cf48-b849-42d4-9f2f-41d071e32109/width=1920,height=1042,fit=cover,gravity=0.50x0.50,sharpen=0.40/e68a645c401d8a904398c3743b121f01.jpg');"></div>
        <div class="slide" style="background-image: url('https://rocketspark.pictures/CF-a0f2cf45-dc15-4501-bc5a-1ddd78942b6b/width=1920,height=1042,fit=cover,gravity=0.50x0.50,sharpen=0.40/3ef673ffa0f98b6dedc16c8883cf5b1e.jpg');"></div>

        <div class="hero-overlay"></div>

        <div class="hero-content">
            <h1>Romance your relationship</h1>
            <p>"The difference between something good and something great, is attention to detail." <br>— Charles R. Swindoll</p>
            <a href="#services" class="btn-luxury">Explore Experiences</a>
        </div>
    </header>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            let currentSlide = 0;
            const slideInterval = 5000; // Time per slide in milliseconds (5 seconds)

            function nextSlide() {
                // Remove active class from current slide
                slides[currentSlide].classList.remove('active');
                
                // Move to next slide, loop back to start if at the end
                currentSlide = (currentSlide + 1) % slides.length;
                
                // Add active class to new slide
                slides[currentSlide].classList.add('active');
            }

            // Start the interval
            setInterval(nextSlide, slideInterval);
        });
    </script>

</body>
</html>
